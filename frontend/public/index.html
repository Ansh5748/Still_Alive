        <script>
            // MetaMask Shield & Global Extension Error Suppression
            (function() {
                // Aggressively stub ethereum and web3 to prevent extension injection
                const silentStub = { 
                    request: () => new Promise(() => {}), 
                    on: () => {}, 
                    removeListener: () => {}, 
                    enable: () => new Promise(() => {}),
                    isMetaMask: false 
                };
                
                Object.defineProperty(window, 'ethereum', {
                    configurable: false, enumerable: false, value: silentStub, writable: false
                });
                window.web3 = { currentProvider: silentStub };

                // Suppress "Uncaught" errors from extensions that trigger the React Error Overlay
                window.addEventListener('unhandledrejection', (e) => {
                    const msg = (e.reason?.message || '').toLowerCase();
                    if (msg.includes('metamask') || msg.includes('extension')) {
                        e.stopImmediatePropagation();
                        e.preventDefault();
                    }
                }, true);

                window.addEventListener('error', (e) => {
                    const msg = (e.message || '').toLowerCase();
                    if (msg.includes('metamask') || msg.includes('extension')) {
                        e.stopImmediatePropagation();
                        e.preventDefault();
                    }
                }, true);
            })();
        </script>
        <title>Still Alive</title>
    </head>
